# nginx :3002 → php-fpm :9074 (генерируется dev-fpm.sh)
worker_processes 2;
error_log /tmp/cabinet-nginx-error.log warn;
pid /tmp/cabinet-nginx.pid;
daemon on;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       __NGINX_PREFIX__/mime.types;
    default_type  application/octet-stream;
    access_log    /tmp/cabinet-nginx-access.log;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 64m;

    server {
        listen 3002;
        listen [::]:3002;
        server_name localhost 127.0.0.1;
        root __CABINET_ROOT__/public;
        index index.php index.html;

        # AdminLTE demo (public/html, в .gitignore — scripts/sync-lte-html.sh)
        location /html/ {
            try_files $uri $uri/ /html/index.html;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9074;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            include __NGINX_PREFIX__/fastcgi_params;
            fastcgi_read_timeout 1200s;
            fastcgi_connect_timeout 60s;
            # Laravel + debug_session: иначе 502 «upstream sent too big header»
            fastcgi_buffer_size 128k;
            fastcgi_buffers 16 256k;
            fastcgi_busy_buffers_size 512k;
        }
    }
}
