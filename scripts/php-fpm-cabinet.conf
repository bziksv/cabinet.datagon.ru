; Пул php-fpm для кабинета (dev-fpm.sh) — параллельные запросы, удалённая БД
[cabinet]
user = __USER__
group = staff
listen = 127.0.0.1:9074
listen.backlog = 511
pm = dynamic
pm.max_children = 16
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
; Анализ конкурентов: 2+ региона, hybrid XML — до ~15–20 мин (set_time_limit в job не выше admin)
php_admin_value[max_execution_time] = 1200
php_admin_value[default_socket_timeout] = 120
php_admin_value[memory_limit] = 512M
catch_workers_output = yes
